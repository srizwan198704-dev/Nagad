name: Android Build Pipeline

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    name: Generate and Release APK
    runs-on: ubuntu-latest
    permissions:
      contents: write # রিলিজ তৈরি করার জন্য এই পারমিশনটি জরুরি

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: 8.5

      - name: Grant Execute Permission
        run: chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug

      # সরাসরি APK ফাইলটি রিলিজ সেকশনে আপলোড করার স্টেপ
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: app/build/outputs/apk/debug/app-debug.apk
          tag_name: build-${{ github.run_number }}
          name: App Build v${{ github.run_number }}
          body: "সরাসরি নিচের লিঙ্ক থেকে APK ডাউনলোড করুন।"
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
