name: Android Build Pipeline

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    name: Generate and Release APK
    runs-on: ubuntu-latest
    permissions:
      contents: write # রিলিজ তৈরি করার জন্য প্রয়োজনীয় পারমিশন

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      # নির্দিষ্ট গ্র্যাডল ভার্সন সেটআপ (যা রানার মেশিনে সরাসরি গ্র্যাডল কমান্ড এনাবেল করবে)
      - name: Setup Gradle 8.5
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: 8.5

      # 'gradlew' এর বদলে সরাসরি 'gradle' ব্যবহার করা হয়েছে যাতে ফাইল নট ফাউন্ড এরর না আসে
      - name: Build Debug APK
        run: gradle assembleDebug

      # সরাসরি রিলিজ সেকশনে APK ফাইলটি পুশ করা
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: app/build/outputs/apk/debug/app-debug.apk
          tag_name: build-${{ github.run_number }}
          name: Nagad App v${{ github.run_number }}
          body: "ডাউনলোড করতে নিচের Assets সেকশন থেকে app-debug.apk ফাইলে ক্লিক করুন।"
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
